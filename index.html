<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta id="theme-color" name="theme-color" content="#eecf62" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SPIRIT" />
  <meta name="format-detection" content="telephone=no" />
  <title>Spirit Coffee · Fidelización</title>
  <script>
    (() => {
      const savedTheme = localStorage.getItem('spirit-theme');
      const theme = savedTheme || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.dataset.theme = theme;
      document.querySelector('#theme-color').content = theme === 'dark' ? '#171612' : '#eecf62';
    })();
  </script>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="64x64" href="assets/icons/favicon-64.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="/business/business.css" />
</head>
<body>
  <div id="app" aria-live="polite"></div>
  <div id="toast" class="toast" role="status"></div>
  <script src="app.js"></script>
  <script type="module" src="/business/business-view.js"></script>
</body>
</html>
